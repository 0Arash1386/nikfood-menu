<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت نیک فود</title>

<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

</head>

<body>

<div id="toast"></div>

<div class="container">

<aside class="sidebar">

<h2>🍔 Nik Food</h2>

<button class="menu active">غذاها</button>
<button class="menu">دسته بندی</button>
<button class="menu">تنظیمات</button>

</aside>

<main class="content">

<h1>پنل مدیریت</h1>

<div class="card">

<h2>افزودن غذا</h2>

<input id="name" placeholder="نام غذا">

<input id="price" type="number" placeholder="قیمت">

<select id="category">

<option value="برگر">برگر</option>
<option value="پیتزا">پیتزا</option>
<option value="سوخاری">سوخاری</option>
<option value="سالاد">سالاد</option>

</select>

<textarea
id="ingredients"
placeholder="ترکیبات"></textarea>

<button id="save">
💾 ذخیره غذا
</button>

</div>

<hr>

<h2>لیست غذاها</h2>

<div id="foods"></div>

</main>

</div>
<script src="github.js"></script>
<script src="admin.js"></script>

</body>

</html>
